<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorite Artists — Fluffy Music</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/mypage.css}">
</head>
<body>

  <nav class="navbar">
    <a href="/Mainpage" class="navbar-logo">Fluffy Music</a>
    <div class="navbar-links">
      <a href="/Mainpage">Home</a>
      <a href="/Mypage">My Page</a>
      <a href="/recommendationpage">Discover</a>
    </div>
  </nav>

  <main class="main-content">

    <div class="page-back">
      <a href="/Mypage" class="back-link">← My Page</a>
    </div>

    <section class="page-header">
      <h1 class="page-title">Favorite Artists</h1>
      <p class="page-subtitle">Artists you've saved</p>
    </section>

    <section class="artist-list-section">
      <ul class="artist-grid" th:if="${artists}">
        <li class="artist-card" th:each="artist : ${artists}">
          <span class="artist-name" th:text="${artist.artist}"></span>
        </li>
      </ul>
      <div class="empty-state" th:if="${not artists}">
        <p>No artists saved yet. <a href="/Mainpage" class="link-primary">Discover some music.</a></p>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>© 2025 Fluffy Music. All rights reserved.</p>
  </footer>

</body>
</html>
