<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Page — Fluffy Music</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/mypage.css}">
</head>
<body>

  <nav class="navbar">
    <a href="/Mainpage" class="navbar-logo">Fluffy Music</a>
    <div class="navbar-links">
      <a href="/Mainpage">Home</a>
      <a href="/recommendationpage">Discover</a>
      <a href="/Settings">Settings</a>

  <main class="main-content">

    <section class="page-header">
      <h1 class="page-title">My Page</h1>
      <p class="page-subtitle">Your music, all in one place.</p>

    <section class="mypage-grid">

      <a href="/mypage-likedartist" class="mypage-card">

        <h2 class="mypage-card-title">Favorite Artists</h2>

  <footer class="footer">

  </footer>
